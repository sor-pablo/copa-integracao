<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Copa Integração - Rede Calábria</title>
</head>
<body>
<header>
    <h1>Rede Calábria</h1>
    <h2>Copa Integração</h2>
    <p>Datas: 16 de março (Futebol) | 17 de março (Vôlei)</p>
</header>

<main>
    <button id="gerarChaves">Gerar chaves do campeonato</button>

    <section id="chaves">
        <h3>Chaves do Campeonato</h3>
        <div id="futebolManha"></div>
        <div id="futebolTarde"></div>
        <div id="voleiManha"></div>
        <div id="voleiTarde"></div>
    </section>

    <section id="proximosJogos">
        <h3>Próximos Jogos</h3>
        <ul id="proximos"></ul>
    </section>

    <section id="ultimosResultados">
        <h3>Últimos Resultados</h3>
        <ul id="resultados"></ul>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
